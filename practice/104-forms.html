<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Forms</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="p-4">
    <h1>Forms</h1>
    <ol>
        <li>Styling the Form with Bootstrap</li>
        <li>Retrieve information usign the form</li>
        <li>Create objects with a constructor</li>
    </ol>
    <!-- Create the Form -->
    <h2>Product Registration</h2>
    <form class="p-3 border m-5 rounded bg-light">
        <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="productName" placeholder="Name">
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input class="form-control" type="number" id="productPrice" placeholder="$8.99">
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" name="" id="productCategory">
                <option value="">Select a Category</option>
                <option value="Fruit">Fruit</option>
                <option value="Electronic">Electronic</option>
            </select>
        </div>
        <div class="d-flex justify-content-end gap-3">
        <button onclick="registerProduct(event)" type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
    </form>

        <!-- Product Container -->
        <div id="productList">

        </div>

        <script src="/practice/lesson js/104-forms.js" async defer></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
