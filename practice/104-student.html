<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="m-5">
        <section>
            <h1>Student Registration</h1>
            <form id="studentForm" class="p-3 border m-5 rounded bg-light">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input class="form-control" type="text" placeholder="John Wick" id="studentName">
                </div>
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input class="form-control" type="number" placeholder="10" id="studentAge">
                </div>
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select class="form-select" id="studentCourse">
                        <option>Select a Course</option>
                        <option value="Math">Math</option>
                        <option value="Science">Science</option>
                    </select>
                </div>
                <div class="d-flex justify-content-end gap-3">
                    <button onclick="registerStudent(event)" type="submit" class="btn btn-primary">Save</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>
            </form>
        </section>
        <section class="m-5">
            <h2>Student List</h2>

            <table class="table">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Course</th>
                        <th>Delete</th>
                    </tr>
                    <tbody id="tableList">
                        <tr>
                        <td>John</td>
                        <td>10</td>
                        <td>Math</td>
                        <td> <button class="btn btn-danger delete-btn">Delete</button> </td>
                        </tr>
                    </tbody>
            </table>
        </section>
        
        <script src="/practice/lesson js/104-student.js"></script>
    </body>
</html>
