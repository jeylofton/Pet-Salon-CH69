<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Pet Salon</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="p-4">
    <header>
        <h1>Pet Salon</h1>
        <nav>
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Services</a>
        <a href="#">Registration</a>
        </nav>
    </header>
    <section>
        <div>
        <h2>Registered Pets</h2>
        <ol id="petNames">
        </ol>
        </div>
        <div>
        <h2>Registration</h2>
        <form class="p-3 border m-5 rounded bg-light">
        <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="petName2" placeholder="Name">
        </div>
        <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" id="petAge" placeholder="7">
        </div>
        <div class="mb-3">
        <label class="form-label">Breed</label>
        <input class="form-control" type="text" name="" id="petBreed" placeholder="Breed Name">
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="" id="petGender">
                <option value="">Select a Gender</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Service</label>
            <select class="form-select" name="" id="petService">
                <option value="">Select Service</option>
                <option value="Wash">Wash</option>
                <option value="Overnight Stay">Overnight Stay</option>
                <option value="Play Date">Play Date</option>
                <option value="Walking">Walking</option>
            </select>
        </div>
        </div>
        <div class="d-flex justify-content-end gap-3">
        <button onclick="registerPet(event)" type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
        </form>
        </div>

    </section>
        
        <script src="scripts/registration.js" defer></script>
    </body>
</html>
