<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">

    </head>
    <body class="p-4">
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Pet Salon</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
        <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
        </li>
        <li class="nav-item">
        <a class="nav-link" href="registration.html">Registration</a>
        </li>
        <li class="nav-item">
        <a class="nav-link" href="services.html">Services</a>
        </li>
        <li class="nav-item">
        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>
    </ul>
    </div>
    </div>
    </nav>
    </header>
    <section>
        <div class="p-4">
        <h2>Registered Pets</h2>
        <ol id="petNames">
        </ol>
        </div>
        <div>
        <h2>Registration</h2>
        <form id="petForm" class="p-3 border m-5 rounded bg-light">
        <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="petName2" placeholder="Name">
        </div>
        <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" id="petAge" placeholder="7">
        </div>
        <div class="mb-3">
        <label class="form-label">Breed</label>
        <input class="form-control" type="text" name="" id="petBreed" placeholder="Breed Name">
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="" id="petGender">
                <option value="">Select a Gender</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Service</label>
            <select class="form-select" name="" id="petService">
                <option value="">Select Service</option>
                <option value="Wash">Wash</option>
                <option value="Overnight Stay">Overnight Stay</option>
                <option value="Play Date">Play Date</option>
                <option value="Walking">Walking</option>
            </select>
        </div>
        </div>
        <div class="d-flex justify-content-end gap-3">
        <button onclick="registerPet(event)" type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
        </form>
        </div>
    </section>
    <section class="m-5">
            <h2>Pet List</h2>
            <table class="table">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Service</th>
                        <th>Breed</th>
                        <th>Delete</th>
                    </tr>
                    <tbody id="tableList">
                        <tr>
                        <td>Walter</td>
                        <td>7</td>
                        <td>Male</td>
                        <td>Grooming</td>
                        <td>Mixed</td>
                        <td> <button class="btn btn-danger">Delete</button> </td>
                        </tr>
                        <tr>
                        <td>Tato</td>
                        <td>4</td>
                        <td>Male</td>
                        <td>Nail Clipping</td>
                        <td>Mixed</td>
                        <td> <button class="btn btn-danger">Delete</button> </td>
                        </tr>
                        <tr>
                        <td>Rocky</td>
                        <td>6</td>
                        <td>Male</td>
                        <td>Ear Cleaning</td>
                        <td>Mixed</td>
                        <td> <button class="btn btn-danger">Delete</button> </td>
                        </tr>
                    </tbody>
            </table>
        </section>
        
        <script src="scripts/registration.js" defer></script>
    </body>
</html>
