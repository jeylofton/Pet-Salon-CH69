<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Balboa Doggie Care Center</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
    <a class="navbar-brand" href="index.html"><img src="image/logo.png" alt="Balboa Doggie Care Center" height="45"></a>
    <div class="d-flex align-items-center ms-auto order-lg-last">
    <button id="changeModeButton" class="btn btn-dark btn-sm me-2">🌙 Change Mode</button>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
    </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
        <li class="nav-item">
        <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="registration.html">Registration</a>
        </li>
        <li class="nav-item">
        <a class="nav-link" href="services.html">Services</a>
        </li>
    </ul>
    </div>
    </div>
    </nav>
    </header>
    <main>

    <section class="page-header">
        <h1>Registration</h1>
        <p class="lead">Book a pet in and see who is with us today.</p>
    </section>

    <section class="page-section">
        <div class="registered-pets">
        <h2>Registered Pets</h2>
        <ol id="petNames">
        </ol>
        </div>
        <div class="row g-4">
        <div class="col-lg-6">
        <h2>Register a Pet</h2>
        <form id="petForm" class="p-4 border rounded">
        <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="petName2" placeholder="Name">
        </div>
        <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" id="petAge" placeholder="7">
        </div>
        <div class="mb-3">
        <label class="form-label">Breed</label>
        <input class="form-control" type="text" name="" id="petBreed" placeholder="Breed Name">
        </div>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="" id="petGender">
                <option value="">Select a Gender</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Service</label>
            <select class="form-select" name="" id="petService">
                <option value="">Select Service</option>
                <option value="Wash">Wash</option>
                <option value="Overnight Stay">Overnight Stay</option>
                <option value="Play Date">Play Date</option>
                <option value="Walking">Walking</option>
            </select>
        </div>
        <div class="d-flex justify-content-end gap-3">
        <button onclick="registerPet(event)" type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
        </form>
        </div>
        <div class="col-lg-6">
        <h2>Pet List</h2>
        <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Service</th>
                    <th>Breed</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="tableList">
                <tr>
                <td>Walter</td>
                <td>7</td>
                <td>Male</td>
                <td>Grooming</td>
                <td>Mixed</td>
                <td> <button class="btn btn-danger">Delete</button> </td>
                </tr>
                <tr>
                <td>Tato</td>
                <td>4</td>
                <td>Male</td>
                <td>Nail Clipping</td>
                <td>Mixed</td>
                <td> <button class="btn btn-danger">Delete</button> </td>
                </tr>
                <tr>
                <td>Rocky</td>
                <td>6</td>
                <td>Male</td>
                <td>Ear Cleaning</td>
                <td>Mixed</td>
                <td> <button class="btn btn-danger">Delete</button> </td>
                </tr>
            </tbody>
        </table>
        </div>
        </div>
        </div>
    </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="scripts/darkmode.js"></script>
    <script src="scripts/registration.js" defer></script>
    </body>
</html>
